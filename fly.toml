# fly.toml - Fly.io app configuration
# Generated for KEF (Kerala Economic Forum) app

app = "kef-app"
primary_region = "sin" # Singapore - closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true   # Stop when no traffic (saves free allowance)
  auto_start_machines = true  # Auto wake on request
  min_machines_running = 0    # 0 = fully free (sleeps when idle)

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
